name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  core:
    name: Core (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[test]"

      - name: Verify C extensions
        working-directory: /tmp
        run: python -c "from tambora.dynamics.forces.self_gravity.falcON._falcon import gravity; print('_falcon OK')"

      - name: Run tests with coverage
        working-directory: /tmp
        run: |
          python -m pytest --pyargs tambora.tests -o "addopts=" --cov=tambora --cov-report=term-missing --cov-report=xml:$GITHUB_WORKSPACE/coverage.xml -q

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  galpy-compat:
    name: galpy ${{ matrix.galpy-version }} (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
        galpy-version: ["1.9", "1.10", "1.11"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[test]"
          pip install "galpy==${{ matrix.galpy-version }}.*"

      - name: Pin scipy for older galpy
        if: matrix.galpy-version == '1.9'
        run: pip install "scipy<1.14"

      - name: Run galpy-specific tests
        working-directory: /tmp
        run: |
          python -m pytest --pyargs tambora.tests.test_galpy_bridge tambora.tests.test_galpy_tools -o "addopts=" -q
