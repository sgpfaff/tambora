name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  core:
    name: Core (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[test]"

      - name: Verify C extensions
        working-directory: /tmp
        run: python -c "from ezfalcon.dynamics.forces.self_gravity.falcON._falcon import gravity; print('_falcon OK')"

      - name: Run tests with coverage
        working-directory: /tmp
        run: |
          python -m pytest --pyargs ezfalcon.tests -o "addopts=" --cov=ezfalcon --cov-report=term-missing -q

  galpy-compat:
    name: galpy ${{ matrix.galpy-version }} (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
        galpy-version: ["1.9", "1.10", "1.11"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[test]"
          pip install "galpy==${{ matrix.galpy-version }}.*"

      - name: Pin scipy for older galpy
        if: matrix.galpy-version == '1.9'
        run: pip install "scipy<1.14"

      - name: Run galpy-specific tests
        working-directory: /tmp
        run: |
          python -m pytest --pyargs ezfalcon.tests.test_galpy_bridge ezfalcon.tests.test_galpy_tools -o "addopts=" -q
