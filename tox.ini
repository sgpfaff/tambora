[tox]
min_version = 4.0
envlist =
    py312-full
    py312-galpy{110,111,latest}
    py312-oldestdeps

# ---------------------------------------------------------------------------
# Tier 1: Full test suite with latest deps (default development check)
# ---------------------------------------------------------------------------
[testenv:py312-full]
description = full test suite with latest dependencies
pass_env =
    CI
    CC
    LOCALE_ARCHIVE
    LC_ALL
set_env =
    MPLBACKEND = agg
deps =
    pytest
    pytest-cov
    numpy
    astropy
    scipy
    tqdm
    galpy
commands =
    pytest {toxinidir}/tambora/tests/ --override-ini="addopts=" -v {posargs}

# ---------------------------------------------------------------------------
# Tier 2: Galpy version matrix (only galpy-specific tests)
# ---------------------------------------------------------------------------
[testenv:py312-galpy{110,111,latest}]
description =
    galpy110: galpy bridge tests with galpy 1.10.x
    galpy111: galpy bridge tests with galpy 1.11.x
    galpylatest: galpy bridge tests with latest galpy
pass_env =
    CI
    CC
    LOCALE_ARCHIVE
    LC_ALL
set_env =
    MPLBACKEND = agg
deps =
    pytest
    pytest-cov
    numpy
    astropy
    scipy
    tqdm
    galpy110: galpy>=1.10,<1.11
    galpy111: galpy>=1.11,<1.12
    galpylatest: galpy
commands =
    pytest {toxinidir}/tambora/tests/test_galpy_bridge.py {toxinidir}/tambora/tests/test_galpy_tools.py --override-ini="addopts=" -v {posargs}

# ---------------------------------------------------------------------------
# Tier 3: Oldest supported deps (catches deprecation removals)
# ---------------------------------------------------------------------------
[testenv:py312-oldestdeps]
description = full test suite with oldest supported dependency versions
pass_env =
    CI
    CC
    LOCALE_ARCHIVE
    LC_ALL
set_env =
    MPLBACKEND = agg
deps =
    pytest
    pytest-cov
    numpy==1.26.0
    astropy==6.0
    scipy==1.12.0
    tqdm
    galpy==1.10.0
commands =
    pytest {toxinidir}/tambora/tests/ --override-ini="addopts=" -v {posargs}

# ---------------------------------------------------------------------------
# Docs
# ---------------------------------------------------------------------------
[testenv:build_docs]
description = invoke sphinx-build to build the HTML docs
change_dir =
    docs
extras =
    docs
commands =
    sphinx-build -j auto --color -W --keep-going -b html -d _build/.doctrees . _build/html {posargs}
